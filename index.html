  <body>

    <!-- Defensive cleanup: unregister any previously installed service workers -->
    <script>
      if ('serviceWorker' in navigator) {
        // Register the kill-switch SW once so previously-cached SWs are cleaned up,
        // then it self-unregisters. Also defensively unregister any stragglers.
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
          setTimeout(() => {
            navigator.serviceWorker.getRegistrations()
              .then((regs) => regs.forEach((r) => r.unregister()))
              .catch(() => {});
          }, 5000);
        });
      }
    </script>
